<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0A070"/>
      <stop offset="50%" stop-color="#E8755A"/>
      <stop offset="100%" stop-color="#C4526A"/>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect width="100" height="100" rx="20" ry="20" fill="url(#bg)"/>

  <!-- circuit lines (tech halo) -->
  <line x1="50" y1="19" x2="50" y2="8" stroke="white" stroke-width="1.8" opacity="0.85"/>
  <circle cx="50" cy="6" r="2.5" fill="white" opacity="0.85"/>
  <line x1="43" y1="22" x2="32" y2="11" stroke="white" stroke-width="1.8" opacity="0.85"/>
  <circle cx="30" cy="9" r="2.5" fill="white" opacity="0.85"/>
  <line x1="37" y1="27" x2="16" y2="21" stroke="white" stroke-width="1.8" opacity="0.85"/>
  <circle cx="13" cy="20" r="2.5" fill="white" opacity="0.85"/>
  <line x1="57" y1="22" x2="68" y2="11" stroke="white" stroke-width="1.8" opacity="0.85"/>
  <circle cx="70" cy="9" r="2.5" fill="white" opacity="0.85"/>
  <line x1="63" y1="27" x2="84" y2="21" stroke="white" stroke-width="1.8" opacity="0.85"/>
  <circle cx="87" cy="20" r="2.5" fill="white" opacity="0.85"/>

  <!-- hair flowing behind head -->
  <path d="M39 26 C34 33 32 50 34 68" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M61 26 C66 33 68 50 66 68" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- head -->
  <circle cx="50" cy="30" r="11.5" fill="none" stroke="white" stroke-width="2.2"/>

  <!-- glasses -->
  <ellipse cx="44.5" cy="31" rx="4.2" ry="3.2" fill="none" stroke="white" stroke-width="1.6"/>
  <ellipse cx="54.5" cy="31" rx="4.2" ry="3.2" fill="none" stroke="white" stroke-width="1.6"/>
  <line x1="48.7" y1="31" x2="50.3" y2="31" stroke="white" stroke-width="1.6"/>
  <line x1="40.3" y1="30.5" x2="38.8" y2="29.8" stroke="white" stroke-width="1.6"/>
  <line x1="58.7" y1="30.5" x2="60.2" y2="29.8" stroke="white" stroke-width="1.6"/>

  <!-- neck -->
  <path d="M47 41.5 L47.5 47 L52.5 47 L53 41.5" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>

  <!-- shoulders & body -->
  <path d="M36 52 C38 47 44 46 50 46 C56 46 62 47 64 52 L67 74 L33 74 Z"
    fill="none" stroke="white" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- arms going to laptop -->
  <path d="M37 56 L27 69" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M63 56 L73 69" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- laptop screen -->
  <path d="M24 68 L24 55 Q24 53 26 53 L74 53 Q76 53 76 55 L76 68"
    fill="none" stroke="white" stroke-width="2"/>
  <!-- laptop screen dot -->
  <circle cx="50" cy="61" r="3" fill="none" stroke="white" stroke-width="1.5"/>

  <!-- laptop base -->
  <rect x="22" y="68" width="56" height="5" rx="1.5" fill="none" stroke="white" stroke-width="2"/>
  <line x1="18" y1="73" x2="82" y2="73" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
