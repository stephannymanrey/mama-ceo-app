version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - mkdir -p public/ffmpeg
        - cp node_modules/@ffmpeg/core/dist/umd/ffmpeg-core.js public/ffmpeg/ffmpeg-core.js
        - cp node_modules/@ffmpeg/core/dist/umd/ffmpeg-core.wasm public/ffmpeg/ffmpeg-core.wasm
        - echo "FFmpeg copiado:" && ls -lh public/ffmpeg/
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
